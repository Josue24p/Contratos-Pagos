<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow-lg" style="width: 400px;">
    <div class="card-body p-5">
      <h3 class="text-center mb-4">Iniciar Sesión</h3>
      
      <form (ngSubmit)="onLogin()">
        <div class="mb-3">
          <label class="form-label">Usuario</label>
          <input type="text" name="username" class="form-control" [(ngModel)]="username" required>
        </div>
        
        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input type="password" name="password" class="form-control" [(ngModel)]="password" required>
        </div>

        <div *ngIf="errorMessage" class="alert alert-danger py-2 small">
          {{ errorMessage }}
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-3">Ingresar</button>
      </form>

      <div class="text-center mt-3">
        <small>¿No tienes cuenta? <a routerLink="/registro">Regístrate aquí</a></small>
      </div>
    </div>
  </div>
</div>
